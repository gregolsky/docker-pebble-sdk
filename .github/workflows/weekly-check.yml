name: Weekly Version Check

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  check-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest upstream versions
        id: upstream
        run: |
          out=$(bash scripts/resolve-upstream-versions.sh)
          tool=$(awk -F= '/^LATEST_TOOL_VER=/{print $2}' <<<"$out")
          sdk=$(awk  -F= '/^LATEST_SDK_VER=/{print $2}'  <<<"$out")
          printf 'tool_ver=%s\nsdk_ver=%s\n' "$tool" "$sdk" >> "$GITHUB_OUTPUT"

      - name: Validate resolved versions
        env:
          TOOL: ${{ steps.upstream.outputs.tool_ver }}
          SDK: ${{ steps.upstream.outputs.sdk_ver }}
        run: |
          if [ -z "$TOOL" ] || [ "$TOOL" = "unknown" ] \
          || [ -z "$SDK" ] || [ "$SDK" = "unknown" ]; then
            echo "::error::Failed to resolve upstream versions (tool='$TOOL' sdk='$SDK'). Aborting before opening a PR."
            exit 1
          fi

      - name: Load current pinned versions
        id: current
        run: |
          while IFS='=' read -r k v; do
            case "$k" in
              PEBBLE_TOOL_VERSION)
                [[ "$v" =~ ^[0-9]+(\.[0-9]+){0,3}$ ]] || { echo "::error::bad $k value: $v"; exit 1; }
                echo "tool_ver=$v" >> "$GITHUB_OUTPUT";;
              PEBBLE_SDK_VERSION)
                [[ "$v" =~ ^[0-9]+(\.[0-9]+){0,3}$ ]] || { echo "::error::bad $k value: $v"; exit 1; }
                echo "sdk_ver=$v" >> "$GITHUB_OUTPUT";;
            esac
          done < versions.env

      - name: Check if bump needed
        id: check
        env:
          UPSTREAM_TOOL: ${{ steps.upstream.outputs.tool_ver }}
          UPSTREAM_SDK: ${{ steps.upstream.outputs.sdk_ver }}
          CURRENT_TOOL: ${{ steps.current.outputs.tool_ver }}
          CURRENT_SDK: ${{ steps.current.outputs.sdk_ver }}
        run: |
          if [ "$UPSTREAM_TOOL" = "$CURRENT_TOOL" ] && [ "$UPSTREAM_SDK" = "$CURRENT_SDK" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Versions already current (pebble-tool ${CURRENT_TOOL}, SDK ${CURRENT_SDK})"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Bump needed:"
            echo "  pebble-tool: ${CURRENT_TOOL} → ${UPSTREAM_TOOL}"
            echo "  SDK:         ${CURRENT_SDK} → ${UPSTREAM_SDK}"
          fi

      - name: Create bump PR
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TOOL: ${{ steps.upstream.outputs.tool_ver }}
          NEW_SDK: ${{ steps.upstream.outputs.sdk_ver }}
          OLD_TOOL: ${{ steps.current.outputs.tool_ver }}
          OLD_SDK: ${{ steps.current.outputs.sdk_ver }}
        run: |
          BRANCH="bump/pebble-tool-${NEW_TOOL}-sdk-${NEW_SDK}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"

          printf "PEBBLE_TOOL_VERSION=%s\nPEBBLE_SDK_VERSION=%s\n" "${NEW_TOOL}" "${NEW_SDK}" > versions.env

          git add versions.env
          git commit -m "chore: bump pebble-tool ${NEW_TOOL} / SDK ${NEW_SDK}"
          git push origin "${BRANCH}"

          gh pr create \
            --title "chore: bump pebble-tool ${NEW_TOOL} / SDK ${NEW_SDK}" \
            --body "Automated version bump detected by weekly cron.

          | Component | Old | New |
          |---|---|---|
          | pebble-tool | ${OLD_TOOL} | ${NEW_TOOL} |
          | Pebble SDK | ${OLD_SDK} | ${NEW_SDK} |

          Merging this PR will trigger the build workflow. Tag the resulting commit to publish a release." \
            --head "${BRANCH}" \
            --base main
