name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Load versions
        run: |
          while IFS='=' read -r k v; do
            case "$k" in
              PEBBLE_TOOL_VERSION|PEBBLE_SDK_VERSION)
                [[ "$v" =~ ^[0-9]+(\.[0-9]+){0,3}$ ]] || { echo "::error::bad $k value: $v"; exit 1; }
                echo "$k=$v" >> "$GITHUB_ENV";;
            esac
          done < versions.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Push by digest (no tags yet); the merge job assembles the manifest.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          build-args: |
            PEBBLE_TOOL_VERSION=${{ env.PEBBLE_TOOL_VERSION }}
            PEBBLE_SDK_VERSION=${{ env.PEBBLE_SDK_VERSION }}
          outputs: |
            type=image,name=ghcr.io/${{ github.repository_owner }}/pebble-sdk,push-by-digest=true,name-canonical=true,push=true
            type=image,name=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/pebble-sdk,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Load versions
        run: |
          while IFS='=' read -r k v; do
            case "$k" in
              PEBBLE_TOOL_VERSION|PEBBLE_SDK_VERSION)
                [[ "$v" =~ ^[0-9]+(\.[0-9]+){0,3}$ ]] || { echo "::error::bad $k value: $v"; exit 1; }
                echo "$k=$v" >> "$GITHUB_ENV";;
            esac
          done < versions.env

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/pebble-sdk
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/pebble-sdk
          tags: |
            type=raw,value=latest
            type=raw,value=pebble-tool-${{ env.PEBBLE_TOOL_VERSION }}
            type=raw,value=sdk-${{ env.PEBBLE_SDK_VERSION }}
            type=raw,value=pebble-tool-${{ env.PEBBLE_TOOL_VERSION }}-sdk-${{ env.PEBBLE_SDK_VERSION }}
          labels: |
            io.pebble.tool.version=${{ env.PEBBLE_TOOL_VERSION }}
            io.pebble.sdk.version=${{ env.PEBBLE_SDK_VERSION }}

      - name: Create multi-arch manifest (GHCR)
        working-directory: /tmp/digests
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("ghcr.io"))) | map("-t " + .) | join(" ")' \
                <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/%s/pebble-sdk@sha256:%s ' "$REPO_OWNER" *)

      - name: Create multi-arch manifest (Docker Hub)
        working-directory: /tmp/digests
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("docker.io"))) | map("-t " + .) | join(" ")' \
                <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'docker.io/%s/pebble-sdk@sha256:%s ' "$DOCKERHUB_USERNAME" *)

      - name: Inspect manifest
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          META_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker buildx imagetools inspect \
            "ghcr.io/${REPO_OWNER}/pebble-sdk:${META_VERSION}"

  release:
    needs: merge
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Load versions
        run: |
          while IFS='=' read -r k v; do
            case "$k" in
              PEBBLE_TOOL_VERSION|PEBBLE_SDK_VERSION)
                [[ "$v" =~ ^[0-9]+(\.[0-9]+){0,3}$ ]] || { echo "::error::bad $k value: $v"; exit 1; }
                echo "$k=$v" >> "$GITHUB_ENV";;
            esac
          done < versions.env

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO_OWNER: ${{ github.repository_owner }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          gh release create "$REF_NAME" \
            --title "pebble-tool ${PEBBLE_TOOL_VERSION} / SDK ${PEBBLE_SDK_VERSION}" \
            --notes "## Images

          \`\`\`
          ghcr.io/${REPO_OWNER}/pebble-sdk:pebble-tool-${PEBBLE_TOOL_VERSION}-sdk-${PEBBLE_SDK_VERSION}
          docker.io/${DOCKERHUB_USERNAME}/pebble-sdk:pebble-tool-${PEBBLE_TOOL_VERSION}-sdk-${PEBBLE_SDK_VERSION}
          \`\`\`

          **pebble-tool**: ${PEBBLE_TOOL_VERSION}
          **Pebble SDK**: ${PEBBLE_SDK_VERSION}
          **Platforms**: linux/amd64"
