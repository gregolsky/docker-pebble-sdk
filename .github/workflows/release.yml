name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Load versions
        run: |
          source versions.env
          echo "PEBBLE_TOOL_VERSION=${PEBBLE_TOOL_VERSION}" >> "$GITHUB_ENV"
          echo "PEBBLE_SDK_VERSION=${PEBBLE_SDK_VERSION}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/pebble-sdk
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/pebble-sdk
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=raw,value=pebble-tool-${{ env.PEBBLE_TOOL_VERSION }}
            type=raw,value=sdk-${{ env.PEBBLE_SDK_VERSION }}
            type=raw,value=pebble-tool-${{ env.PEBBLE_TOOL_VERSION }}-sdk-${{ env.PEBBLE_SDK_VERSION }}
            type=sha,prefix=sha-
          labels: |
            io.pebble.tool.version=${{ env.PEBBLE_TOOL_VERSION }}
            io.pebble.sdk.version=${{ env.PEBBLE_SDK_VERSION }}

      - name: Build and push multi-arch
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PEBBLE_TOOL_VERSION=${{ env.PEBBLE_TOOL_VERSION }}
            PEBBLE_SDK_VERSION=${{ env.PEBBLE_SDK_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "pebble-tool ${{ env.PEBBLE_TOOL_VERSION }} / SDK ${{ env.PEBBLE_SDK_VERSION }}" \
            --notes "## Images

          \`\`\`
          ghcr.io/${{ github.repository_owner }}/pebble-sdk:pebble-tool-${{ env.PEBBLE_TOOL_VERSION }}-sdk-${{ env.PEBBLE_SDK_VERSION }}
          docker.io/${{ secrets.DOCKERHUB_USERNAME }}/pebble-sdk:pebble-tool-${{ env.PEBBLE_TOOL_VERSION }}-sdk-${{ env.PEBBLE_SDK_VERSION }}
          \`\`\`

          **pebble-tool**: ${{ env.PEBBLE_TOOL_VERSION }}
          **Pebble SDK**: ${{ env.PEBBLE_SDK_VERSION }}
          **Platforms**: linux/amd64, linux/arm64
          **Digest**: ${{ steps.build-push.outputs.digest }}"
