name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Load versions
        run: |
          source versions.env
          echo "PEBBLE_TOOL_VERSION=${PEBBLE_TOOL_VERSION}" >> "$GITHUB_ENV"
          echo "PEBBLE_SDK_VERSION=${PEBBLE_SDK_VERSION}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Push by digest (no tags yet); the merge job assembles the manifest.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          build-args: |
            PEBBLE_TOOL_VERSION=${{ env.PEBBLE_TOOL_VERSION }}
            PEBBLE_SDK_VERSION=${{ env.PEBBLE_SDK_VERSION }}
          outputs: |
            type=image,name=ghcr.io/${{ github.repository_owner }}/pebble-sdk,push-by-digest=true,name-canonical=true,push=true
            type=image,name=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/pebble-sdk,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Load versions
        run: |
          source versions.env
          echo "PEBBLE_TOOL_VERSION=${PEBBLE_TOOL_VERSION}" >> "$GITHUB_ENV"
          echo "PEBBLE_SDK_VERSION=${PEBBLE_SDK_VERSION}" >> "$GITHUB_ENV"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/pebble-sdk
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/pebble-sdk
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=raw,value=pebble-tool-${{ env.PEBBLE_TOOL_VERSION }}
            type=raw,value=sdk-${{ env.PEBBLE_SDK_VERSION }}
            type=raw,value=pebble-tool-${{ env.PEBBLE_TOOL_VERSION }}-sdk-${{ env.PEBBLE_SDK_VERSION }}
            type=sha,prefix=sha-
          labels: |
            io.pebble.tool.version=${{ env.PEBBLE_TOOL_VERSION }}
            io.pebble.sdk.version=${{ env.PEBBLE_SDK_VERSION }}

      - name: Create multi-arch manifest (GHCR)
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("ghcr.io"))) | map("-t " + .) | join(" ")' \
                <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/pebble-sdk@sha256:%s ' *)

      - name: Create multi-arch manifest (Docker Hub)
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("docker.io"))) | map("-t " + .) | join(" ")' \
                <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'docker.io/${{ secrets.DOCKERHUB_USERNAME }}/pebble-sdk@sha256:%s ' *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/pebble-sdk:${{ steps.meta.outputs.version }}

  release:
    needs: merge
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Load versions
        run: |
          source versions.env
          echo "PEBBLE_TOOL_VERSION=${PEBBLE_TOOL_VERSION}" >> "$GITHUB_ENV"
          echo "PEBBLE_SDK_VERSION=${PEBBLE_SDK_VERSION}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "pebble-tool ${{ env.PEBBLE_TOOL_VERSION }} / SDK ${{ env.PEBBLE_SDK_VERSION }}" \
            --notes "## Images

          \`\`\`
          ghcr.io/${{ github.repository_owner }}/pebble-sdk:pebble-tool-${{ env.PEBBLE_TOOL_VERSION }}-sdk-${{ env.PEBBLE_SDK_VERSION }}
          docker.io/${{ secrets.DOCKERHUB_USERNAME }}/pebble-sdk:pebble-tool-${{ env.PEBBLE_TOOL_VERSION }}-sdk-${{ env.PEBBLE_SDK_VERSION }}
          \`\`\`

          **pebble-tool**: ${{ env.PEBBLE_TOOL_VERSION }}
          **Pebble SDK**: ${{ env.PEBBLE_SDK_VERSION }}
          **Platforms**: linux/amd64"
