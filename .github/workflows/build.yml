name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - name: Load versions
        run: |
          source versions.env
          echo "PEBBLE_TOOL_VERSION=${PEBBLE_TOOL_VERSION}" >> "$GITHUB_ENV"
          echo "PEBBLE_SDK_VERSION=${PEBBLE_SDK_VERSION}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.platform }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          load: false
          build-args: |
            PEBBLE_TOOL_VERSION=${{ env.PEBBLE_TOOL_VERSION }}
            PEBBLE_SDK_VERSION=${{ env.PEBBLE_SDK_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: pebble-sdk:ci

  smoke:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Load versions
        run: |
          source versions.env
          echo "PEBBLE_TOOL_VERSION=${PEBBLE_TOOL_VERSION}" >> "$GITHUB_ENV"
          echo "PEBBLE_SDK_VERSION=${PEBBLE_SDK_VERSION}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build amd64 for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          build-args: |
            PEBBLE_TOOL_VERSION=${{ env.PEBBLE_TOOL_VERSION }}
            PEBBLE_SDK_VERSION=${{ env.PEBBLE_SDK_VERSION }}
          cache-from: type=gha
          tags: pebble-sdk:smoke

      - name: Smoke test
        run: bash test/smoke.sh
        env:
          IMAGE: pebble-sdk:smoke
