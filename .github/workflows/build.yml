name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Load versions
        run: |
          while IFS='=' read -r k v; do
            case "$k" in
              PEBBLE_TOOL_VERSION|PEBBLE_SDK_VERSION)
                [[ "$v" =~ ^[0-9]+(\.[0-9]+){0,3}$ ]] || { echo "::error::bad $k value: $v"; exit 1; }
                echo "$k=$v" >> "$GITHUB_ENV";;
            esac
          done < versions.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build amd64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          build-args: |
            PEBBLE_TOOL_VERSION=${{ env.PEBBLE_TOOL_VERSION }}
            PEBBLE_SDK_VERSION=${{ env.PEBBLE_SDK_VERSION }}
          cache-from: type=gha
          cache-to: ${{ github.event_name == 'push' && 'type=gha,mode=max' || '' }}
          tags: pebble-sdk:smoke

      - name: Smoke test
        run: bash test/smoke.sh
        env:
          IMAGE: pebble-sdk:smoke
